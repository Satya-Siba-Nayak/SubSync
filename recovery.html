<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password | SubSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body style="margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: #0b0e14; display: flex; justify-content: center; align-items: center; height: 100vh;">

    <div style="background-color: #161b22; padding: 45px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); width: 360px; text-align: center; border: 1px solid #30363d;">
        
        <div style="margin-bottom: 30px;">
            <h1 style="color: #ffffff; margin: 0; font-size: 35px; font-weight: 800; letter-spacing: -1.5px; display: inline-block;">
                SubSync<span style="color: #5e5ce6;">.</span>
            </h1>
            <p style="color: #8b949e; font-size: 14px; margin-top: 15px; line-height: 1.5;">Lost your way? Enter your email to get back in. </p>
        </div>

        <form onsubmit="alert('Recovery link sent!'); return false;">
            <div style="text-align: left; margin-bottom: 25px;">
                <label style="display: block; font-size: 13px; font-weight: 600; color: #c9d1d9; margin-bottom: 8px;">Recovery Email</label>
                <input type="email" placeholder="name@mitwpu.edu.in" required 
                    style="width: 100%; padding: 14px; border: 1px solid #30363d; background-color: #0b0e14; border-radius: 12px; box-sizing: border-box; outline: none; font-size: 14px; color: white; font-family: 'Inter', sans-serif;">
            </div>

            <button type="submit" 
                style="width: 100%; padding: 16px; background-color: #5e5ce6; color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; font-family: 'Inter', sans-serif;">
                Send Recovery Email
            </button>
        </form>

        <div style="margin-top: 25px;">
            <a href="login.html" style="color: #5e5ce6; text-decoration: none; font-size: 13px; font-weight: 600;">
                &larr; Back to Login
            </a>
        </div>
    </div>

</body>
</html>
